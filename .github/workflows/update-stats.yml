name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p stats

          # Merged PRs
          PRS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=author:lxcxjxhx+type:pr+is:merged" | \
            jq -r '.total_count')
          echo "{\"schemaVersion\":1,\"label\":\"merged PRs\",\"message\":\"$PRS\",\"color\":\"A85D5D\"}" > stats/prs.json

          # Public repositories
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/lxcxjxhx" | \
            jq -r '.public_repos')
          echo "{\"schemaVersion\":1,\"label\":\"repositories\",\"message\":\"$REPOS\",\"color\":\"5A7A6A\"}" > stats/repos.json

          # Total stars across all repos
          STARS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/lxcxjxhx/repos?per_page=100" | \
            jq -r '[.[].stargazers_count] | add // 0')
          echo "{\"schemaVersion\":1,\"label\":\"total stars\",\"message\":\"$STARS\",\"color\":\"9B7CB6\"}" > stats/stars.json

          # Followers
          FOLL=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/lxcxjxhx" | \
            jq -r '.followers')
          echo "{\"schemaVersion\":1,\"label\":\"followers\",\"message\":\"$FOLL\",\"color\":\"8B7355\"}" > stats/followers.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git push
