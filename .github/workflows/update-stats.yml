name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p stats

          # Merged PRs
          PRS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=author:lxcxjxhx+type:pr+is:merged" | \
            jq -r '.total_count')
          echo "{\"schemaVersion\":1,\"label\":\"merged PRs\",\"message\":\"$PRS\",\"color\":\"f38ba8\"}" > stats/prs.json

          # Public repositories
          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/lxcxjxhx" | \
            jq -r '.public_repos')
          echo "{\"schemaVersion\":1,\"label\":\"repositories\",\"message\":\"$REPOS\",\"color\":\"a9b665\"}" > stats/repos.json

          # Total stars across all repos (handle pagination)
          STARS=0
          for page in 1 2 3; do
            PAGE_STARS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/users/lxcxjxhx/repos?per_page=100&page=$page" | \
              jq -r '[.[].stargazers_count] | add // 0')
            STARS=$((STARS + PAGE_STARS))
          done
          echo "{\"schemaVersion\":1,\"label\":\"total stars\",\"message\":\"$STARS\",\"color\":\"94e2d5\"}" > stats/stars.json

          # Followers
          FOLL=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/lxcxjxhx" | \
            jq -r '.followers')
          echo "{\"schemaVersion\":1,\"label\":\"followers\",\"message\":\"$FOLL\",\"color\":\"f9e2af\"}" > stats/followers.json

      - name: Inject stats into SVG
        run: |
          PRS=$(jq -r '.message' stats/prs.json)
          REPOS=$(jq -r '.message' stats/repos.json)
          STARS=$(jq -r '.message' stats/stars.json)
          FOLLOWERS=$(jq -r '.message' stats/followers.json)

          export PRS REPOS STARS FOLLOWERS
          perl -i -pe 's/(<text id="stat-prs"[^>]*>)[^<]*(<\/text>)/$1$ENV{PRS}$2/' profile-anim.svg
          perl -i -pe 's/(<text id="stat-repos"[^>]*>)[^<]*(<\/text>)/$1$ENV{REPOS}$2/' profile-anim.svg
          perl -i -pe 's/(<text id="stat-stars"[^>]*>)[^<]*(<\/text>)/$1$ENV{STARS}$2/' profile-anim.svg
          perl -i -pe 's/(<text id="stat-followers"[^>]*>)[^<]*(<\/text>)/$1$ENV{FOLLOWERS}$2/' profile-anim.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/ profile-anim.svg
          git diff --cached --quiet || git commit -m "chore: update stats [skip ci]"
          git pull --rebase origin main || true
          git push