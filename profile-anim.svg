<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- ===== FILTERS: 釉面光泽 + 荧光辉光 ===== -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bokeh-blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="petal-sheen">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feSpecularLighting in="b" specularExponent="60" surfaceScale="3" lighting-color="#ffffff" result="spec">
        <fePointLight x="300" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic" k1="0" k2="1" k3="0.3" k4="0"/>
    </filter>

    <!-- ===== GRADIENTS: 参考图片色板 ===== -->
    <!-- 背景：陨石灰暗夜 -->
    <radialGradient id="bgGrad" cx="35%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1E1F1D"/>
      <stop offset="60%" stop-color="#171816"/>
      <stop offset="100%" stop-color="#0C0C0B"/>
    </radialGradient>

    <!-- 主花渐变：深紫 → 猩红 → 紫外高光 -->
    <radialGradient id="hyacinthMain" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#B49BC4"/>
      <stop offset="25%" stop-color="#8C6E9F"/>
      <stop offset="55%" stop-color="#862C3B"/>
      <stop offset="80%" stop-color="#392A40"/>
      <stop offset="100%" stop-color="#1A1A1C"/>
    </radialGradient>

    <!-- 花瓣单片渐变：釉面金属紫 -->
    <linearGradient id="petalPurple" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B49BC4"/>
      <stop offset="40%" stop-color="#8C6E9F"/>
      <stop offset="100%" stop-color="#2D1A36"/>
    </linearGradient>

    <!-- 花瓣猩红变体 -->
    <linearGradient id="petalCrimson" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B33F4E"/>
      <stop offset="45%" stop-color="#862C3B"/>
      <stop offset="100%" stop-color="#392A40"/>
    </linearGradient>

    <!-- 茎部荧光绿 -->
    <linearGradient id="stemGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b7a28"/>
      <stop offset="50%" stop-color="#6CCB4C"/>
      <stop offset="100%" stop-color="#3b7a28"/>
    </linearGradient>

    <!-- 分隔线渐变 -->
    <linearGradient id="sepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#862C3B" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8C6E9F" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#862C3B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#862C3B" stop-opacity="0"/>
    </linearGradient>

    <!-- 文字主渐变 -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B49BC4"/>
      <stop offset="50%" stop-color="#8C6E9F"/>
      <stop offset="100%" stop-color="#B33F4E"/>
    </linearGradient>

    <!-- 数字色 -->
    <radialGradient id="numRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B33F4E"/>
      <stop offset="100%" stop-color="#862C3B"/>
    </radialGradient>
    <radialGradient id="numGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6CCB4C"/>
      <stop offset="100%" stop-color="#3b7a28"/>
    </radialGradient>
    <radialGradient id="numPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B49BC4"/>
      <stop offset="100%" stop-color="#8C6E9F"/>
    </radialGradient>
    <radialGradient id="numGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#8B6D3F"/>
    </radialGradient>

    <!-- 散景光斑渐变 -->
    <radialGradient id="bokeh1">
      <stop offset="0%" stop-color="#8C6E9F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8C6E9F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh2">
      <stop offset="0%" stop-color="#862C3B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#862C3B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh3">
      <stop offset="0%" stop-color="#6CCB4C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6CCB4C" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="clip"><rect width="800" height="200" rx="12"/></clipPath>

    <!-- ===== 风信子花瓣几何体 ===== -->
    <!-- 单片花瓣：尖头椭圆，模拟真实风信子小花 -->
    <path id="floret" d="M0,-18 C4,-18 8,-12 9,-4 C10,2 6,8 0,12 C-6,8 -10,2 -9,-4 C-8,-12 -4,-18 0,-18Z"/>

    <!-- 花簇组：6片花瓣围绕中心 -->
    <g id="floretCluster">
      <use href="#floret" fill="url(#petalPurple)" opacity="0.9"/>
      <use href="#floret" fill="url(#petalCrimson)" opacity="0.85" transform="rotate(60)"/>
      <use href="#floret" fill="url(#petalPurple)" opacity="0.9" transform="rotate(120)"/>
      <use href="#floret" fill="url(#petalCrimson)" opacity="0.85" transform="rotate(180)"/>
      <use href="#floret" fill="url(#petalPurple)" opacity="0.9" transform="rotate(240)"/>
      <use href="#floret" fill="url(#petalCrimson)" opacity="0.85" transform="rotate(300)"/>
    </g>
  </defs>

  <g clip-path="url(#clip)">
    <!-- ===== LAYER 0: 背景 ===== -->
    <rect width="800" height="200" fill="url(#bgGrad)" rx="12"/>

    <!-- ===== LAYER 1: 散景光斑 (bokeh) ===== -->
    <circle cx="120" cy="45" r="50" fill="url(#bokeh1)" filter="url(#bokeh-blur)"/>
    <circle cx="680" cy="160" r="60" fill="url(#bokeh2)" filter="url(#bokeh-blur)"/>
    <circle cx="400" cy="20" r="35" fill="url(#bokeh3)" filter="url(#bokeh-blur)"/>
    <circle cx="50" cy="170" r="40" fill="url(#bokeh2)" filter="url(#bokeh-blur)"/>
    <circle cx="750" cy="50" r="30" fill="url(#bokeh1)" filter="url(#bokeh-blur)"/>
    <circle cx="500" cy="180" r="45" fill="url(#bokeh1)" filter="url(#bokeh-blur)" opacity="0.5"/>

    <!-- ===== LAYER 2: 微弱扫描线 ===== -->
    <g opacity="0.015">
      <line x1="0" y1="0" x2="800" y2="0" stroke="#B49BC4" stroke-width="1">
        <animate attributeName="y1" values="0;200" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="0;200" dur="10s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- ===== LAYER 3: 装饰性风信子花簇 ===== -->
    <!-- 左下大花簇 -->
    <g transform="translate(48, 165) scale(0.5)" opacity="0.18" filter="url(#glow)">
      <use href="#floretCluster"/>
      <circle cx="0" cy="0" r="5" fill="#862C3B" opacity="0.6"/>
    </g>

    <!-- 右上小花簇 -->
    <g transform="translate(755, 35) scale(0.35)" opacity="0.14" filter="url(#glow)">
      <use href="#floretCluster"/>
      <circle cx="0" cy="0" r="4" fill="#862C3B" opacity="0.5"/>
    </g>

    <!-- 中右飘散花瓣 -->
    <g transform="translate(720, 110) scale(0.2) rotate(-30)" opacity="0.08">
      <use href="#floret" fill="url(#petalPurple)"/>
    </g>
    <g transform="translate(85, 55) scale(0.18) rotate(20)" opacity="0.06">
      <use href="#floret" fill="url(#petalCrimson)"/>
    </g>

    <!-- ===== LAYER 4: 荧光茎部装饰线 ===== -->
    <line x1="0" y1="200" x2="180" y2="200" stroke="url(#stemGreen)" stroke-width="1" opacity="0.2"/>
    <line x1="620" y1="200" x2="800" y2="200" stroke="url(#stemGreen)" stroke-width="1" opacity="0.15"/>

    <!-- ===== LAYER 5: 身份区域 (左侧) ===== -->
    <g>
      <!-- HOS 主标题 -->
      <text x="200" y="60" text-anchor="middle" font-family="'Courier New',monospace" font-size="44" font-weight="bold" fill="url(#titleGrad)" filter="url(#glow-strong)">HOS</text>

      <!-- 副标题 -->
      <text x="200" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#8C6E9F" letter-spacing="4" opacity="0.9">HYACINTH OF SECURITY</text>

      <!-- 猩红分隔线 -->
      <rect x="130" y="92" width="140" height="1.5" rx="0.75" fill="url(#sepGrad)"/>

      <!-- 职位 -->
      <text x="200" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#B49BC4" opacity="0.85">AI × Cybersecurity Practitioner</text>

      <!-- 地点 -->
      <text x="200" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6B6B6B">Qian Jiahong · Shanghai, China</text>

      <!-- 闪烁光标 -->
      <rect x="288" y="128" width="7" height="14" rx="1" fill="#862C3B" opacity="0.7">
        <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
      </rect>

      <!-- 盾牌图标 (荧光绿) -->
      <g transform="translate(200, 170)" stroke="#6CCB4C" stroke-width="1" fill="none" opacity="0.2">
        <path d="M0,-8 L6,-5 L6,1.5 Q6,6 0,9 Q-6,6 -6,1.5 L-6,-5 Z"/>
      </g>
    </g>

    <!-- ===== LAYER 6: 猩红分隔柱 ===== -->
    <line x1="385" y1="22" x2="385" y2="178" stroke="url(#sepGrad)" stroke-width="1" opacity="0.35"/>

    <!-- ===== LAYER 7: 动态统计区域 (右侧) ===== -->
    <g>
      <text x="590" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8C6E9F" letter-spacing="4" opacity="0.5">LIVE STATS</text>
      <rect x="535" y="45" width="110" height="1" rx="0.5" fill="url(#sepGrad)" opacity="0.3"/>

      <!-- PRs (猩红) -->
      <g text-anchor="end">
        <text id="stat-prs" x="700" y="80" font-family="'Courier New',monospace" font-size="24" font-weight="bold" fill="url(#numRed)" filter="url(#glow)">17</text>
        <text x="700" y="95" font-family="system-ui,sans-serif" font-size="8.5" fill="#5A5A5A">merged PRs</text>
      </g>

      <!-- Repos (荧光绿) -->
      <g text-anchor="end">
        <text id="stat-repos" x="700" y="128" font-family="'Courier New',monospace" font-size="24" font-weight="bold" fill="url(#numGreen)" filter="url(#glow)">16</text>
        <text x="700" y="143" font-family="system-ui,sans-serif" font-size="8.5" fill="#5A5A5A">repositories</text>
      </g>

      <!-- Stars (紫外紫) -->
      <g text-anchor="end">
        <text id="stat-stars" x="600" y="80" font-family="'Courier New',monospace" font-size="24" font-weight="bold" fill="url(#numPurple)" filter="url(#glow)">24</text>
        <text x="600" y="95" font-family="system-ui,sans-serif" font-size="8.5" fill="#5A5A5A">total stars</text>
      </g>

      <!-- Followers (金属金) -->
      <g text-anchor="end">
        <text id="stat-followers" x="600" y="128" font-family="'Courier New',monospace" font-size="24" font-weight="bold" fill="url(#numGold)" filter="url(#glow)">34</text>
        <text x="600" y="143" font-family="system-ui,sans-serif" font-size="8.5" fill="#5A5A5A">followers</text>
      </g>

      <!-- 自动同步标识 -->
      <text x="590" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#3B3D38">auto-synced daily</text>
    </g>

    <!-- ===== LAYER 8: 角标装饰 ===== -->
    <path d="M0,10 Q0,0 10,0" fill="none" stroke="#8C6E9F" stroke-width="0.6" opacity="0.25"/>
    <path d="M800,10 Q800,0 790,0" fill="none" stroke="#862C3B" stroke-width="0.6" opacity="0.25"/>
    <path d="M0,190 Q0,200 10,200" fill="none" stroke="#862C3B" stroke-width="0.6" opacity="0.25"/>
    <path d="M800,190 Q800,200 790,200" fill="none" stroke="#8C6E9F" stroke-width="0.6" opacity="0.25"/>

    <!-- ===== LAYER 9: 顶部釉面高光条 ===== -->
    <rect x="0" y="0" width="800" height="200" rx="12" fill="none" stroke="#8C6E9F" stroke-width="0.3" opacity="0.15"/>
  </g>
</svg>
