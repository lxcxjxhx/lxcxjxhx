<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b48ead" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b48ead" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b48ead" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="flowerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="35%" stop-color="#b48ead"/>
      <stop offset="100%" stop-color="#a9b665"/>
    </linearGradient>
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#b48ead"/>
    </radialGradient>
    <linearGradient id="petalCopper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#f38ba8"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(180,142,173,0.04)" stroke-width="0.5"/>
    </pattern>
    <clipPath id="clip"><rect width="800" height="200" rx="12"/></clipPath>
    <g id="hyacinthPetal">
      <path d="M0,-10 C5,-10 10,-5 10,0 C10,5 5,10 0,10 C-5,10 -10,5 -10,0 C-10,-5 -5,-10 0,-10Z" stroke="rgba(180,142,173,0.3)" stroke-width="0.8"/>
    </g>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="800" height="200" fill="url(#bgGrad)" rx="12"/>
    <rect width="800" height="200" fill="url(#grid)"/>
    <rect width="800" height="200" fill="rgba(255,255,255,0.01)"/>
    <!-- scan line -->
    <g opacity="0.02">
      <line x1="0" y1="0" x2="800" y2="0" stroke="#fff" stroke-width="1">
        <animate attributeName="y1" values="0;200" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="0;200" dur="8s" repeatCount="indefinite"/>
      </line>
    </g>
    <!-- left bottom petals -->
    <g transform="translate(35, 170) scale(0.35)" opacity="0.12">
      <use href="#hyacinthPetal" x="-20" y="0" fill="url(#petalGrad)"/>
      <use href="#hyacinthPetal" x="0" y="-20" fill="url(#flowerGrad)" transform="rotate(60)"/>
      <use href="#hyacinthPetal" x="20" y="0" fill="url(#petalCopper)" transform="rotate(120)"/>
      <use href="#hyacinthPetal" x="20" y="0" fill="url(#petalGrad)" transform="rotate(180)"/>
      <use href="#hyacinthPetal" x="0" y="20" fill="url(#flowerGrad)" transform="rotate(240)"/>
      <use href="#hyacinthPetal" x="-20" y="0" fill="url(#petalCopper)" transform="rotate(300)"/>
    </g>
    <!-- right top petals -->
    <g transform="translate(765, 30) scale(0.25)" opacity="0.1">
      <use href="#hyacinthPetal" x="-20" y="0" fill="url(#petalGrad)"/>
      <use href="#hyacinthPetal" x="0" y="-20" fill="url(#flowerGrad)" transform="rotate(60)"/>
      <use href="#hyacinthPetal" x="20" y="0" fill="url(#petalCopper)" transform="rotate(120)"/>
    </g>

    <!-- ============ IDENTITY SECTION (left half) ============ -->
    <g>
      <text x="200" y="58" text-anchor="middle" font-family="'Courier New',monospace" font-size="40" font-weight="bold" fill="url(#flowerGrad)" filter="url(#glow2)">HOS</text>
      <text x="200" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#b48ead" letter-spacing="3">HYACINTH OF SECURITY</text>
      <rect x="120" y="90" width="160" height="1" fill="url(#lineGrad)"/>
      <text x="200" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#cdd6f4">AI x Cybersecurity Practitioner</text>
      <text x="200" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a6adc8">Qian Jiahong · Shanghai, China</text>
      <!-- blink cursor -->
      <rect x="290" y="129" width="7" height="13" fill="#f38ba8" opacity="0.6">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <!-- shield icon -->
      <g transform="translate(200,168)" stroke="#a9b665" stroke-width="1" fill="none" opacity="0.2">
        <path d="M0,-8 L6,-5 L6,1.5 Q6,6 0,9 Q-6,6 -6,1.5 L-6,-5 Z"/>
      </g>
    </g>

    <!-- ============ SEPARATOR ============ -->
    <line x1="390" y1="25" x2="390" y2="175" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.3"/>

    <!-- ============ DYNAMIC STATS SECTION (right half) ============ -->
    <g>
      <text x="590" y="40" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#b48ead" letter-spacing="3" opacity="0.6">LIVE STATS</text>
      <rect x="530" y="48" width="120" height="1" fill="url(#lineGrad)" opacity="0.4"/>

      <!-- PRs -->
      <g text-anchor="end">
        <text id="stat-prs" x="700" y="82" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#f38ba8" filter="url(#glow)">17</text>
        <text x="700" y="96" font-family="system-ui,sans-serif" font-size="9" fill="#a6adc8">merged PRs</text>
      </g>

      <!-- Repos -->
      <g text-anchor="end">
        <text id="stat-repos" x="700" y="126" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#a9b665" filter="url(#glow)">13</text>
        <text x="700" y="140" font-family="system-ui,sans-serif" font-size="9" fill="#a6adc8">repositories</text>
      </g>

      <!-- Stars -->
      <g text-anchor="end">
        <text id="stat-stars" x="600" y="82" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#94e2d5" filter="url(#glow)">19</text>
        <text x="600" y="96" font-family="system-ui,sans-serif" font-size="9" fill="#a6adc8">total stars</text>
      </g>

      <!-- Followers -->
      <g text-anchor="end">
        <text id="stat-followers" x="600" y="126" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#f9e2af" filter="url(#glow)">34</text>
        <text x="600" y="140" font-family="system-ui,sans-serif" font-size="9" fill="#a6adc8">followers</text>
      </g>

      <!-- auto-update indicator -->
      <text x="590" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#45475a">auto-synced daily</text>
    </g>

    <!-- corner decoration -->
    <path d="M0,10 Q0,0 10,0" fill="none" stroke="url(#flowerGrad)" stroke-width="0.6" opacity="0.3"/>
    <path d="M800,10 Q800,0 790,0" fill="none" stroke="url(#flowerGrad)" stroke-width="0.6" opacity="0.3"/>
    <path d="M0,190 Q0,200 10,200" fill="none" stroke="url(#flowerGrad)" stroke-width="0.6" opacity="0.3"/>
    <path d="M800,190 Q800,200 790,200" fill="none" stroke="url(#flowerGrad)" stroke-width="0.6" opacity="0.3"/>
  </g>
</svg>
