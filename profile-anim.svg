      <text x="240" y="40" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#9B7CB6" letter-spacing="4" filter="url(#glow)">WHAT I BUILD</text>
      <rect x="160" y="50" width="160" height="1" fill="url(#lineGrad)"/>
      <g>
        <rect x="30" y="65" width="420" height="36" rx="4" fill="rgba(168,93,93,0.08)" stroke="rgba(168,93,93,0.25)" stroke-width="0.5" filter="url(#softGlow)"/>
        <text x="48" y="80" font-family="'Courier New',monospace" font-size="9" fill="#A85D5D">01</text>
        <text x="68" y="80" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">HOS-LS</text>
        <text x="68" y="93" font-family="system-ui,sans-serif" font-size="9" fill="#888888">AI-native security platform · 7-agent pipeline · &lt;5% false positive</text>
        <rect x="370" y="73" width="65" height="16" rx="8" fill="rgba(168,93,93,0.15)"/><text x="402" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#A85D5D">Flagship</text>
      </g>
      <g>
        <rect x="30" y="110" width="420" height="36" rx="4" fill="rgba(155,124,182,0.08)" stroke="rgba(155,124,182,0.25)" stroke-width="0.5" filter="url(#softGlow)"/>
        <text x="48" y="125" font-family="'Courier New',monospace" font-size="9" fill="#9B7CB6">02</text>
        <text x="68" y="125" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">Multi-Agent Systems</text>
        <text x="68" y="138" font-family="system-ui,sans-serif" font-size="9" fill="#888888">LLM orchestration · RAG pipelines · Prompt engineering</text>
      </g>
      <g>
        <rect x="30" y="155" width="420" height="36" rx="4" fill="rgba(74,155,74,0.08)" stroke="rgba(74,155,74,0.25)" stroke-width="0.5" filter="url(#softGlow)"/>
        <text x="48" y="170" font-family="'Courier New',monospace" font-size="9" fill="#4A9B4A">03</text>
        <text x="68" y="170" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">Security Research</text>
        <text x="68" y="183" font-family="system-ui,sans-serif" font-size="9" fill="#888888">CTF (national level) · AI red team · Exploit development</text>
      </g>
    </g>

    <!-- ==================== SLIDE 4: CONNECT (hidden on GitHub) ==================== -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;0;1;1;0" keyTimes="0;0.219;0.25;0.469;0.5;0.719;0.75;0.969;1" dur="16s" repeatCount="indefinite"/>
      <text x="240" y="40" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#9B7CB6" letter-spacing="4" filter="url(#glow)">CONNECT</text>
      <rect x="180" y="50" width="120" height="1" fill="url(#lineGrad)"/>
      <text x="240" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666666" letter-spacing="2">TECH STACK</text>

      <!-- First row -->
      <rect x="40" y="90" width="56" height="20" rx="10" fill="rgba(168,93,93,0.12)" stroke="rgba(168,93,93,0.28)" stroke-width="0.5"/>
      <text x="68" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#A85D5D">Python</text>
      <rect x="102" y="90" width="58" height="20" rx="10" fill="rgba(155,124,182,0.12)" stroke="rgba(155,124,182,0.28)" stroke-width="0.5"/>
      <text x="131" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9B7CB6">PyTorch</text>
      <rect x="166" y="90" width="40" height="20" rx="10" fill="rgba(90,122,106,0.12)" stroke="rgba(90,122,106,0.28)" stroke-width="0.5"/>
      <text x="186" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5A7A6A">LLM</text>
      <rect x="212" y="90" width="62" height="20" rx="10" fill="rgba(139,115,85,0.12)" stroke="rgba(139,115,85,0.28)" stroke-width="0.5"/>
      <text x="243" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8B7355">FastAPI</text>
      <rect x="280" y="90" width="52" height="20" rx="10" fill="rgba(74,155,74,0.12)" stroke="rgba(74,155,74,0.28)" stroke-width="0.5"/>
      <text x="306" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4A9B4A">React</text>
      <rect x="338" y="90" width="64" height="20" rx="10" fill="rgba(168,93,93,0.12)" stroke="rgba(168,93,93,0.28)" stroke-width="0.5"/>
      <text x="370" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#A85D5D">Docker</text>

      <!-- Second row -->
      <rect x="40" y="118" width="60" height="20" rx="10" fill="rgba(155,124,182,0.12)" stroke="rgba(155,124,182,0.28)" stroke-width="0.5"/>
      <text x="70" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9B7CB6">QLoRA</text>
      <rect x="106" y="118" width="48" height="20" rx="10" fill="rgba(90,122,106,0.12)" stroke="rgba(90,122,106,0.28)" stroke-width="0.5"/>
      <text x="130" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5A7A6A">RAG</text>
      <rect x="160" y="118" width="54" height="20" rx="10" fill="rgba(74,155,74,0.12)" stroke="rgba(74,155,74,0.28)" stroke-width="0.5"/>
      <text x="187" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4A9B4A">vLLM</text>
      <rect x="220" y="118" width="74" height="20" rx="10" fill="rgba(155,124,182,0.12)" stroke="rgba(155,124,182,0.28)" stroke-width="0.5"/>
      <text x="257" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9B7CB6">LangGraph</text>
      <rect x="300" y="118" width="66" height="20" rx="10" fill="rgba(139,115,85,0.12)" stroke="rgba(139,115,85,0.28)" stroke-width="0.5"/>
      <text x="333" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8B7355">Neo4j</text>
      <rect x="372" y="118" width="68" height="20" rx="10" fill="rgba(90,122,106,0.12)" stroke="rgba(90,122,106,0.28)" stroke-width="0.5"/>
      <text x="406" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5A7A6A">Tree-sitter</text>

      <text x="240" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666666" letter-spacing="2">REACH ME</text>
      <text x="240" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">aqfxz_zh@qq.com</text>
      <text x="240" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888888">CSDN: Security Hyacinth · 1467 articles · 12+ columns</text>
    </g>

    <!-- corner decoration (always visible) -->
    <path d="M0,10 Q0,0 10,0" fill="none" stroke="url(#flowerGrad)" stroke-width="0.8" opacity="0.4"/>
    <path d="M480,10 Q480,0 470,0" fill="none" stroke="url(#flowerGrad)" stroke-width="0.8" opacity="0.4"/>
    <path d="M0,210 Q0,220 10,220" fill="none" stroke="url(#flowerGrad)" stroke-width="0.8" opacity="0.4"/>
    <path d="M480,210 Q480,220 470,220" fill="none" stroke="url(#flowerGrad)" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>
