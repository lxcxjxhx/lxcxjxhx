<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bokeh-blur"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="bokeh-sm"><feGaussianBlur stdDeviation="8"/></filter>

    <radialGradient id="bgGrad" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1E1F1D"/><stop offset="45%" stop-color="#141514"/><stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="petalPurple" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B49BC4"/><stop offset="40%" stop-color="#8C6E9F"/><stop offset="100%" stop-color="#2D1A36"/>
    </linearGradient>
    <linearGradient id="petalCrimson" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B33F4E"/><stop offset="45%" stop-color="#862C3B"/><stop offset="100%" stop-color="#392A40"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B49BC4"/><stop offset="50%" stop-color="#8C6E9F"/><stop offset="100%" stop-color="#B33F4E"/>
    </linearGradient>
    <linearGradient id="sepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#862C3B" stop-opacity="0"/><stop offset="50%" stop-color="#8C6E9F" stop-opacity="0.4"/><stop offset="100%" stop-color="#862C3B" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="numRed" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#B33F4E"/><stop offset="100%" stop-color="#862C3B"/></radialGradient>
    <radialGradient id="numGreen" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#6CCB4C"/><stop offset="100%" stop-color="#3b7a28"/></radialGradient>
    <radialGradient id="numPurple" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#B49BC4"/><stop offset="100%" stop-color="#8C6E9F"/></radialGradient>
    <radialGradient id="numGold" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#C9A96E"/><stop offset="100%" stop-color="#8B6D3F"/></radialGradient>
    <radialGradient id="bokeh1"><stop offset="0%" stop-color="#8C6E9F" stop-opacity="0.18"/><stop offset="100%" stop-color="#8C6E9F" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokeh2"><stop offset="0%" stop-color="#862C3B" stop-opacity="0.14"/><stop offset="100%" stop-color="#862C3B" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokeh3"><stop offset="0%" stop-color="#6CCB4C" stop-opacity="0.1"/><stop offset="100%" stop-color="#6CCB4C" stop-opacity="0"/></radialGradient>
    <radialGradient id="bokehGold"><stop offset="0%" stop-color="#C9A96E" stop-opacity="0.08"/><stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/></radialGradient>

    <clipPath id="clip"><rect width="800" height="200" rx="12"/></clipPath>

    <path id="floret" d="M0,-18 C4,-18 8,-12 9,-4 C10,2 6,8 0,12 C-6,8 -10,2 -9,-4 C-8,-12 -4,-18 0,-18Z"/>
    <g id="floretCluster">
      <use href="#floret" fill="url(#petalPurple)" opacity="0.9"/>
      <use href="#floret" fill="url(#petalCrimson)" opacity="0.85" transform="rotate(60)"/>
      <use href="#floret" fill="url(#petalPurple)" opacity="0.9" transform="rotate(120)"/>
      <use href="#floret" fill="url(#petalCrimson)" opacity="0.85" transform="rotate(180)"/>
      <use href="#floret" fill="url(#petalPurple)" opacity="0.9" transform="rotate(240)"/>
      <use href="#floret" fill="url(#petalCrimson)" opacity="0.85" transform="rotate(300)"/>
    </g>
  </defs>

  <g clip-path="url(#clip)">
    <!-- ============ 背景层 (始终可见) ============ -->
    <rect width="800" height="200" fill="url(#bgGrad)" rx="12"/>

    <!-- 大面积散景 (10个) -->
    <circle cx="100" cy="60" r="80" fill="url(#bokeh1)" filter="url(#bokeh-blur)">
      <animate attributeName="cx" values="100;200;50;120;100" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;30;90;50;60" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="170" r="90" fill="url(#bokeh2)" filter="url(#bokeh-blur)">
      <animate attributeName="cx" values="700;600;750;650;700" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="170;140;190;160;170" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="30" r="55" fill="url(#bokeh3)" filter="url(#bokeh-blur)">
      <animate attributeName="cx" values="400;480;340;420;400" dur="17s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="30;50;20;40;30" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="55;70;45;60;55" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="40" r="40" fill="url(#bokeh1)" filter="url(#bokeh-sm)">
      <animate attributeName="cy" values="40;80;20;60;40" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="180" r="60" fill="url(#bokeh2)" filter="url(#bokeh-sm)">
      <animate attributeName="cx" values="50;90;30;70;50" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="190" r="70" fill="url(#bokeh1)" filter="url(#bokeh-blur)">
      <animate attributeName="cx" values="550;480;600;520;550" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="110" r="45" fill="url(#bokeh3)" filter="url(#bokeh-sm)">
      <animate attributeName="cy" values="110;80;130;100;110" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="180" r="50" fill="url(#bokehGold)" filter="url(#bokeh-blur)">
      <animate attributeName="cx" values="200;250;170;220;200" dur="19s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="60" r="35" fill="url(#bokeh2)" filter="url(#bokeh-sm)">
      <animate attributeName="cx" values="650;690;620;670;650" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;90;40;70;60" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="140" r="50" fill="url(#bokehGold)" filter="url(#bokeh-sm)">
      <animate attributeName="cy" values="140;110;160;130;140" dur="16s" repeatCount="indefinite"/>
    </circle>

    <!-- 微粒星点 -->
    <circle cx="170" cy="25" r="1.2" fill="#B49BC4" opacity="0.4"><animate attributeName="opacity" values="0.4;0.05;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="195" r="0.8" fill="#6CCB4C" opacity="0.3"><animate attributeName="opacity" values="0.3;0;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="80" r="1.3" fill="#B33F4E" opacity="0.35"><animate attributeName="opacity" values="0.35;0.05;0.35" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="200" r="0.7" fill="#8C6E9F" opacity="0.3"><animate attributeName="opacity" values="0.3;0;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="20" r="1" fill="#C9A96E" opacity="0.25"><animate attributeName="opacity" values="0.25;0;0.25" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="130" r="0.9" fill="#B49BC4" opacity="0.3"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="200" r="1.1" fill="#6CCB4C" opacity="0.2"><animate attributeName="opacity" values="0.2;0;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="15" r="0.6" fill="#B33F4E" opacity="0.3"><animate attributeName="opacity" values="0.3;0;0.3" dur="4.2s" repeatCount="indefinite"/></circle>

    <!-- 双扫描线 -->
    <g opacity="0.015">
      <line x1="0" y1="0" x2="800" y2="0" stroke="#B49BC4" stroke-width="0.8">
        <animate attributeName="y1" values="0;200" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="0;200" dur="6s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="100" x2="0" y2="100" stroke="#862C3B" stroke-width="0.5">
        <animate attributeName="y1" values="200;0" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="200;0" dur="8s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- 花簇装饰 (呼吸效果) -->
    <g transform="translate(35, 195) scale(0.35)" opacity="0.1" filter="url(#glow)">
      <animate attributeName="opacity" values="0.1;0.17;0.1" dur="7s" repeatCount="indefinite"/>
      <use href="#floretCluster"/><circle cx="0" cy="0" r="5" fill="#862C3B" opacity="0.5"/>
    </g>
    <g transform="translate(765, 25) scale(0.25)" opacity="0.08" filter="url(#glow)">
      <animate attributeName="opacity" values="0.08;0.14;0.08" dur="9s" repeatCount="indefinite"/>
      <use href="#floretCluster"/><circle cx="0" cy="0" r="4" fill="#862C3B" opacity="0.4"/>
    </g>
    <g transform="translate(670, 205) scale(0.12) rotate(-20)" opacity="0.07" filter="url(#glow)">
      <animate attributeName="opacity" values="0.07;0.12;0.07" dur="5.5s" repeatCount="indefinite"/>
      <use href="#floret" fill="url(#petalPurple)"/>
    </g>
    <g transform="translate(150, 40) scale(0.1) rotate(30)" opacity="0.05" filter="url(#glow)">
      <animate attributeName="opacity" values="0.05;0.09;0.05" dur="6.5s" repeatCount="indefinite"/>
      <use href="#floret" fill="url(#petalCrimson)"/>
    </g>

    <!-- 荧光茎部装饰线 -->
    <line x1="0" y1="200" x2="200" y2="200" stroke="url(#petalPurple)" stroke-width="0.6" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="200" x2="800" y2="200" stroke="url(#petalCrimson)" stroke-width="0.6" opacity="0.06">
      <animate attributeName="opacity" values="0.06;0.12;0.06" dur="6s" repeatCount="indefinite"/>
    </line>

    <!-- ============================================================ -->
    <!-- 5-SLIDE CAROUSEL: 12s cycle, cross-fade, NO black gaps      -->
    <!-- Pattern: each slide visible 2.0s, fade in/out 0.4s         -->
    <!-- Overlap ensures at least one slide always visible            -->
    <!-- ============================================================ -->

    <!-- SLIDE 1: BRAND (0.0-2.4s visible, wrap 10.0-12.0s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.167;0.2;0.833;0.867;1" dur="12s" repeatCount="indefinite"/>

      <text x="400" y="70" text-anchor="middle" font-family="'Courier New',monospace" font-size="52" font-weight="bold" fill="url(#titleGrad)" filter="url(#glow-strong)">HOS</text>
      <text x="400" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8C6E9F" letter-spacing="5" opacity="0.8">HYACINTH OF SECURITY</text>
      <rect x="310" y="106" width="180" height="1" rx="0.5" fill="url(#sepGrad)"/>
      <text x="400" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#B49BC4" opacity="0.75">AI × Cybersecurity Practitioner</text>
      <text x="400" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5A5A5A">Qian Jiahong · Shanghai, China</text>
      <rect x="468" y="146" width="7" height="15" rx="1" fill="#862C3B" opacity="0.7"><animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/></rect>
      <g transform="translate(400,185) scale(0.3)" opacity="0.08" filter="url(#glow)"><use href="#floretCluster"/></g>
    </g>

    <!-- SLIDE 2: LIVE STATS (2.0-4.4s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.167;0.2;0.333;0.367;1" dur="12s" repeatCount="indefinite"/>

      <text x="400" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8C6E9F" letter-spacing="5" opacity="0.5">LIVE STATS</text>
      <rect x="345" y="46" width="110" height="0.8" rx="0.4" fill="url(#sepGrad)" opacity="0.3"/>

      <g text-anchor="middle">
        <text id="stat-prs" x="160" y="95" font-family="'Courier New',monospace" font-size="32" font-weight="bold" fill="url(#numRed)" filter="url(#glow)">24</text>
        <text x="160" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#5A5A5A">merged PRs</text>
      </g>
      <g text-anchor="middle">
        <text id="stat-repos" x="320" y="95" font-family="'Courier New',monospace" font-size="32" font-weight="bold" fill="url(#numPurple)" filter="url(#glow)">25</text>
        <text x="320" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#5A5A5A">repositories</text>
      </g>
      <g text-anchor="middle">
        <text id="stat-stars" x="480" y="95" font-family="'Courier New',monospace" font-size="32" font-weight="bold" fill="url(#numGreen)" filter="url(#glow)">75</text>
        <text x="480" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#5A5A5A">total stars</text>
      </g>
      <g text-anchor="middle">
        <text id="stat-followers" x="640" y="95" font-family="'Courier New',monospace" font-size="32" font-weight="bold" fill="url(#numGold)" filter="url(#glow)">37</text>
        <text x="640" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#5A5A5A">followers</text>
      </g>

      <text x="400" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3B3D38" opacity="0.45">1,467 articles · 7 PyPI packages · 1,007 commits/yr</text>
      <text x="400" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#2D2D2D">auto-synced daily via GitHub Actions</text>
    </g>

    <!-- SLIDE 3: FLAGSHIP HOS-LS (4.0-6.4s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.367;0.5;0.533;1" dur="12s" repeatCount="indefinite"/>

      <text x="400" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#862C3B" letter-spacing="5" opacity="0.5">FLAGSHIP PROJECT</text>
      <rect x="320" y="46" width="160" height="0.8" rx="0.4" fill="url(#sepGrad)" opacity="0.3"/>

      <text x="400" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="bold" fill="#e0e0e0" filter="url(#glow)">HOS-LS</text>
      <text x="400" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8C6E9F" opacity="0.65">AI-driven Code Security Analysis &amp; Attack Chain Reasoning</text>

      <g font-family="system-ui,sans-serif" font-size="9" fill="#5A5A5A" text-anchor="middle">
        <text x="175" y="135">🧠 AI Semantic Analysis</text>
        <text x="335" y="135">⛓️ Attack Chain Engine</text>
        <text x="495" y="135">🤖 Multi-Agent Architecture</text>
        <text x="655" y="135">💉 Exploit Generation</text>
      </g>

      <rect x="100" y="150" width="600" height="0.5" fill="url(#sepGrad)" opacity="0.15"/>
      <text x="400" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3B3D38" opacity="0.35">Beyond Regex · End-to-end Attack Path Reasoning · Auto Verification</text>
      <text x="400" y="190" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#862C3B" opacity="0.35">github.com/lxcxjxhx/HOS-LS</text>
    </g>

    <!-- SLIDE 4: HIGHLIGHTS (6.0-8.4s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.533;0.667;0.7;1" dur="12s" repeatCount="indefinite"/>

      <text x="400" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#C9A96E" letter-spacing="5" opacity="0.5">HIGHLIGHTS</text>
      <rect x="330" y="46" width="140" height="0.8" rx="0.4" fill="url(#sepGrad)" opacity="0.3"/>

      <g text-anchor="middle">
        <text x="230" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#C9A96E">🏆 中美创客特等奖</text>
        <text x="230" y="95" font-family="system-ui,sans-serif" font-size="8" fill="#5A5A5A">China-US Youth Maker Grand Prize</text>
      </g>
      <g text-anchor="middle">
        <text x="400" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#B49BC4">📜 CSDN Expert Blogger</text>
        <text x="400" y="95" font-family="system-ui,sans-serif" font-size="8" fill="#5A5A5A">1,467 articles · 1.2M+ views · 12+ columns</text>
      </g>
      <g text-anchor="middle">
        <text x="570" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#6CCB4C">🔑 Intel AI Competition</text>
        <text x="570" y="95" font-family="system-ui,sans-serif" font-size="8" fill="#5A5A5A">AI + Threat Detection Innovation</text>
      </g>

      <text x="400" y="128" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#3B3D38" opacity="0.4">Aliyun Expert · Huawei Expert · Tencent Star · Security Emergency Response · CET-6</text>
      <text x="400" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#2D2D2D">Neo4j Certified · HF Agent · MCP · 7 PyPI packages · Hugging Face Models</text>

      <rect x="250" y="165" width="300" height="0.5" fill="url(#sepGrad)" opacity="0.15"/>
      <text x="400" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5A5A5A">1,467+ original articles · 7 PyPI packages · 1,007 commits in 2025</text>
    </g>

    <!-- SLIDE 5: TECH & CONTACT (8.0-10.4s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.667;0.7;0.833;0.867;1" dur="12s" repeatCount="indefinite"/>

      <text x="400" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#B49BC4" letter-spacing="5" opacity="0.5">TECH STACK &amp; CONTACT</text>
      <rect x="300" y="46" width="200" height="0.8" rx="0.4" fill="url(#sepGrad)" opacity="0.3"/>

      <text x="400" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#B49BC4" opacity="0.7" letter-spacing="2">Python · PyTorch · LangChain · FastAPI · Docker · vLLM</text>
      <text x="400" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6CCB4C" opacity="0.6" letter-spacing="2">Neo4j · React · Triton · QLoRA · RAG · Multi-Agent</text>
      <text x="400" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#C9A96E" opacity="0.5" letter-spacing="2">CTF · Exploit Dev · MCP · GitHub Actions · CI/CD</text>

      <rect x="250" y="138" width="300" height="0.5" fill="url(#sepGrad)" opacity="0.15"/>

      <text x="400" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5A5A5A">17 merged PRs · triton · pytorch · garak · flash-attn · liger-kernel · pydantic-ai</text>

      <text x="400" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3B3D38" opacity="0.4">✉ aqfxz_zh@qq.com · github.com/lxcxjxhx · security-hyacinth.blog.csdn.net</text>
    </g>

    <!-- ============ 装饰边框 (始终可见) ============ -->
    <path d="M0,8 Q0,0 8,0" fill="none" stroke="#8C6E9F" stroke-width="0.35" opacity="0.15"/>
    <path d="M800,8 Q800,0 792,0" fill="none" stroke="#862C3B" stroke-width="0.35" opacity="0.15"/>
    <path d="M0,192 Q0,200 8,200" fill="none" stroke="#862C3B" stroke-width="0.35" opacity="0.15"/>
    <path d="M800,192 Q800,200 792,200" fill="none" stroke="#8C6E9F" stroke-width="0.35" opacity="0.15"/>
    <rect x="0" y="0" width="800" height="200" rx="12" fill="none" stroke="#8C6E9F" stroke-width="0.2" opacity="0.08"/>
  </g>
</svg>