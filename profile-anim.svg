<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 主题色：血红铁灰 ↔ 风信子紫绿 -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B7CB6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9B7CB6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9B7CB6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1625"/>
      <stop offset="100%" stop-color="#2A3A4A"/>
    </linearGradient>
    <linearGradient id="flowerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A85D5D"/>
      <stop offset="35%" stop-color="#9B7CB6"/>
      <stop offset="100%" stop-color="#4A9B4A"/>
    </linearGradient>
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8A4D0"/>
      <stop offset="100%" stop-color="#6B4E7C"/>
    </radialGradient>
    <linearGradient id="petalCopper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C87D7D"/>
      <stop offset="100%" stop-color="#8B3A3A"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(155,124,182,0.06)" stroke-width="0.5"/>
    </pattern>
    <clipPath id="clip"><rect width="480" height="220" rx="12"/></clipPath>
    <!-- 风信子六瓣花装饰 -->
    <g id="hyacinthPetal">
      <path d="M0,-12 C6,-12 12,-6 12,0 C12,6 6,12 0,12 C-6,12 -12,6 -12,0 C-12,-6 -6,-12 0,-12Z" stroke="rgba(155,124,182,0.3)" stroke-width="1"/>
    </g>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="480" height="220" fill="url(#bgGrad)" rx="12"/>
    <rect width="480" height="220" fill="url(#grid)"/>
    <!-- subtle noise overlay -->
    <rect width="480" height="220" fill="rgba(255,255,255,0.015)"/>
    <!-- scan lines -->
    <g opacity="0.02">
      <line x1="0" y1="0" x2="480" y2="0" stroke="#fff" stroke-width="1">
        <animate attributeName="y1" values="0;220" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="0;220" dur="8s" repeatCount="indefinite"/>
      </line>
    </g>
    <!-- 左下角花瓣装饰 -->
    <g transform="translate(32, 188) scale(0.4)" opacity="0.15">
      <use href="#hyacinthPetal" x="-24" y="0" fill="url(#petalGrad)"/>
      <use href="#hyacinthPetal" x="0" y="-24" fill="url(#flowerGrad)" transform="rotate(60)"/>
      <use href="#hyacinthPetal" x="24" y="0" fill="url(#petalCopper)" transform="rotate(120)"/>
      <use href="#hyacinthPetal" x="24" y="0" fill="url(#petalGrad)" transform="rotate(180)"/>
      <use href="#hyacinthPetal" x="0" y="24" fill="url(#flowerGrad)" transform="rotate(240)"/>
      <use href="#hyacinthPetal" x="-24" y="0" fill="url(#petalCopper)" transform="rotate(300)"/>
    </g>
    <!-- 右上角花瓣装饰 -->
    <g transform="translate(448, 32) scale(0.3)" opacity="0.12">
      <use href="#hyacinthPetal" x="-24" y="0" fill="url(#petalGrad)"/>
      <use href="#hyacinthPetal" x="0" y="-24" fill="url(#flowerGrad)" transform="rotate(60)"/>
      <use href="#hyacinthPetal" x="24" y="0" fill="url(#petalCopper)" transform="rotate(120)"/>
    </g>

    <!-- ==================== SLIDE 1: IDENTITY (always visible) ==================== -->
    <g>
      <!-- HOS logo with double color gradient -->
      <text x="240" y="62" text-anchor="middle" font-family="'Courier New',monospace" font-size="42" font-weight="bold" fill="url(#flowerGrad)" filter="url(#glow2)">HOS</text>
      <text x="240" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#9B7CB6" letter-spacing="3">HYACINTH OF SECURITY</text>
      <rect x="140" y="102" width="200" height="1" fill="url(#lineGrad)"/>
      <text x="240" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#e0e0e0">AI x Cybersecurity Practitioner</text>
      <text x="240" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#888888">Qian Jiahong · Shanghai, China</text>
      <!-- blink cursor -->
      <rect x="340" y="148" width="8" height="14" fill="#A85D5D" opacity="0.5">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <!-- shield icon -->
      <g transform="translate(240,188)" stroke="#4A9B4A" stroke-width="1.2" fill="none" opacity="0.25">
        <path d="M0,-10 L8,-6 L8,2 Q8,8 0,12 Q-8,8 -8,2 L-8,-6 Z"/>
      </g>
      <!-- animation -->
      <animate attributeName="opacity" values="1;1;0;0;0;0;0;0" keyTimes="0;0.219;0.25;0.469;0.5;0.719;0.75;1" dur="16s" repeatCount="indefinite"/>
    </g>

    <!-- ==================== SLIDE 2: IMPACT (hidden on GitHub) ==================== -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0;0;0" keyTimes="0;0.219;0.25;0.469;0.5;0.719;0.75;1" dur="16s" repeatCount="indefinite"/>
      <text x="240" y="40" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#9B7CB6" letter-spacing="4" filter="url(#glow)">IMPACT</text>
      <rect x="180" y="50" width="120" height="1" fill="url(#lineGrad)"/>
      <g text-anchor="middle">
        <text x="80" y="100" font-family="'Courier New',monospace" font-size="30" font-weight="bold" fill="#A85D5D" filter="url(#glow)">927</text>
        <text x="80" y="120" font-family="system-ui,sans-serif" font-size="10" fill="#888888">commits / year</text>
        <rect x="55" y="130" width="50" height="2" fill="#A85D5D" opacity="0.2" rx="1"/>
      </g>
      <g text-anchor="middle">
        <text x="185" y="100" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#9B7CB6" filter="url(#glow)">1,467</text>
        <text x="185" y="120" font-family="system-ui,sans-serif" font-size="10" fill="#888888">original articles</text>
        <rect x="160" y="130" width="50" height="2" fill="#9B7CB6" opacity="0.2" rx="1"/>
      </g>
      <g text-anchor="middle">
        <text x="290" y="100" font-family="'Courier New',monospace" font-size="30" font-weight="bold" fill="#5A7A6A" filter="url(#glow)">14</text>
        <text x="290" y="120" font-family="system-ui,sans-serif" font-size="10" fill="#888888">repositories</text>
        <rect x="265" y="130" width="50" height="2" fill="#5A7A6A" opacity="0.2" rx="1"/>
      </g>
      <g text-anchor="middle">
        <text x="400" y="100" font-family="'Courier New',monospace" font-size="30" font-weight="bold" fill="#4A9B4A" filter="url(#glow)">7</text>
        <text x="400" y="120" font-family="system-ui,sans-serif" font-size="10" fill="#888888">PyPI packages</text>
        <rect x="375" y="130" width="50" height="2" fill="#4A9B4A" opacity="0.2" rx="1"/>
      </g>
      <text x="240" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666666">Open source · CSDN expert blogger · Intel AI competition</text>
      <text x="240" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8B7355" opacity="0.8">China-US Youth Maker Grand Prize</text>
    </g>

    <!-- ==================== SLIDE 3: FOCUS (hidden on GitHub) ==================== -->
    <g opacity="0">
